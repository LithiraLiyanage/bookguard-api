# =============================================
#  BookGuard API - Application Configuration
# =============================================

# Server
server.port=8080
spring.application.name=BookGuard-API

# H2 In-Memory Database (Development)
spring.datasource.url=jdbc:h2:mem:bookguarddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=bookguard
spring.datasource.password=bookguard123
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# MYSQL PRODUCTION CONFIG (uncomment when ready)
# =============================================
# spring.datasource.url=jdbc:mysql://localhost:3306/bookguard?useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=yourpassword
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
